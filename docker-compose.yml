services:
  # --- Infrastructure ---

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-compmon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-compmon}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-compmon}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-compmon}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-compmon}
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./scripts/init_mongo.js:/docker-entrypoint-initdb.d/init_mongo.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # --- Database Migrations (one-off) ---

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-compmon}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-compmon}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-compmon}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-compmon}
      MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-compmon}:${MONGO_INITDB_ROOT_PASSWORD:-changeme}@mongodb:27017/${MONGO_INITDB_DATABASE:-compmon}?authSource=admin
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - app-network

  # --- Backend API ---

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-compmon}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-compmon}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-compmon}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-compmon}
      MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-compmon}:${MONGO_INITDB_ROOT_PASSWORD:-changeme}@mongodb:27017/${MONGO_INITDB_DATABASE:-compmon}?authSource=admin
      REDIS_URL: redis://redis:6379/0
      REDIS_RESULT_URL: redis://redis:6379/1
      REDIS_CACHE_URL: redis://redis:6379/2
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-alerts@localhost}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost:5174
      LOG_LEVEL: debug
      PUBLIC_LANDING_ONLY_MODE: ${PUBLIC_LANDING_ONLY_MODE:-false}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  # --- Celery Workers ---

  worker-scraper:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A workers.celery_app worker --queues=scraper --concurrency=4 --loglevel=info -n scraper@%h
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-compmon}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-compmon}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-compmon}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-compmon}
      MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-compmon}:${MONGO_INITDB_ROOT_PASSWORD:-changeme}@mongodb:27017/${MONGO_INITDB_DATABASE:-compmon}?authSource=admin
      REDIS_URL: redis://redis:6379/0
      REDIS_RESULT_URL: redis://redis:6379/1
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
    volumes:
      - ./backend:/app
      - playwright-browsers:/root/.cache/ms-playwright
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - app-network

  worker-analysis:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A workers.celery_app worker --queues=analysis --concurrency=8 --loglevel=info -n analysis@%h
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-compmon}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-compmon}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-compmon}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-compmon}
      MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-compmon}:${MONGO_INITDB_ROOT_PASSWORD:-changeme}@mongodb:27017/${MONGO_INITDB_DATABASE:-compmon}?authSource=admin
      REDIS_URL: redis://redis:6379/0
      REDIS_RESULT_URL: redis://redis:6379/1
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-alerts@localhost}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - app-network

  worker-default:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A workers.celery_app worker --queues=default --concurrency=2 --loglevel=info -n default@%h
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-compmon}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-compmon}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-compmon}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-compmon}
      MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-compmon}:${MONGO_INITDB_ROOT_PASSWORD:-changeme}@mongodb:27017/${MONGO_INITDB_DATABASE:-compmon}?authSource=admin
      REDIS_URL: redis://redis:6379/0
      REDIS_RESULT_URL: redis://redis:6379/1
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@shadow.app}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - app-network

  # --- Celery Beat Scheduler ---

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A workers.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-compmon}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-compmon}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-compmon}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-compmon}
      MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-compmon}:${MONGO_INITDB_ROOT_PASSWORD:-changeme}@mongodb:27017/${MONGO_INITDB_DATABASE:-compmon}?authSource=admin
      REDIS_URL: redis://redis:6379/0
      REDIS_RESULT_URL: redis://redis:6379/1
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network

  # --- Flower (Celery Monitoring) ---

  flower:
    image: mher/flower:2.0
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network

  # --- Frontend ---

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  playwright-browsers:
